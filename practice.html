<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate 3D Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>Ultimate 3D Cube</h1>
        <p>Swipe or Drag to rotate! Claim 3 blocks in any 3D direction!</p>
        <div id="status">Player X's Turn</div>
    </div>

    <div class="scene" id="scene">
        <div class="cube" id="cube">
            </div>
    </div>

    <div class="controls">
        <button class="btn" id="autoRotate">Toggle Auto-Spin</button>
        <button class="btn" id="resetView">Reset View</button>
        <button class="btn" id="reset">Restart Game</button>
    </div>

    <script src="app.js">
      
    </script>
</body>
</html>
